<div class="content-panel fade-in">
  <div class="grid-card">
    <div class="catchment-table-scroller">
      
      <app-custom-grid
        title="Craft More Outlets Monitor"
        [columns]="columns" 
        [hiddenFields]="hiddenFields"
        [data]="data"
        [showAdd]="true"
        [dialogFields]="dialogFields"
         [disableValidation]="true" 
        (onSaveData)="SaveRecord($event)"
        (onUpdateView)="handleStatusUpdate($event)"
        (actionClicked)="onGridAction($event)" 
        (fieldChange)="handleFormChange($event)" 
        [editableFields]="['comments']"
        [Modulewiserejectbox]="true"
        *ngIf="!mappopup">
      </app-custom-grid>

    </div>
  </div>
</div>


<div class="custom-modal" *ngIf="mappopup">
  <div class="modal-content">
    <h3>Product Details</h3>
    <table class="table table-bordered">
      <thead>
        <tr style="background: #333; color: white;">
          <th>Category</th>
          <th>Sub Category</th>
          <th>Name</th>
          <th>Quantity</th>
          <th>Rate</th>
          <th>Selling</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of selectedProductDetails">
           <td>{{item.pro_category}}</td>
          <td>{{item.pro_sub_category}}</td>
          <td>{{item.name}}</td>
          <td>{{item.quantity}}</td>
          <td>{{item.rate}}</td>
          <td>{{item.selling}}</td>
        </tr>
      </tbody>
    </table>
    <button (click)="mappopup = false" class="btn btn-danger">Close</button>
  </div>
</div>
