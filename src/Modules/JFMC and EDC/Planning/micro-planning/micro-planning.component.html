<div class="magic-forest-wrapper">
  <div class="glass-content-layer">
    
    <header class="page-header">
      <h1 class="page-title">Micro Planning</h1>
      <div class="breadcrumb-container">
        <div class="v-accent-bar"></div>
        <nav class="breadcrumb-nav">
          FIGS / JFMC & EDC / PLANNING / <span class="active">MICRO PLANNING</span>
        </nav>
      </div>
    </header>

    <div class="toolbar-panel">
      <div class="toolbar-inner">
        <div class="upload-controls">
          
          <!-- DYNAMIC LOOP: Generates inputs based on TS configuration -->
          <ng-container *ngFor="let control of inputControls; let i = index">
            <label [for]="'file-input-' + i" class="glass-tile">
              <i [class]="control.icon"></i>
              <div class="tile-info">
                <strong>{{ control.label }}</strong>
                <span class="file-name" [title]="control.fileName">
                  {{ control.fileName || 'Select File' }}
                </span>
              </div>
            </label>
            <input 
              [id]="'file-input-' + i" 
              type="file" 
              (change)="onFileChange($event, control.key)" 
              hidden>
          </ng-container>

        </div>

        <div class="action-btn-wrap">
          <button class="btn-go-orange" (click)="processData()" [disabled]="isLoading">
            <span *ngIf="!isLoading">GO</span>
            <div *ngIf="isLoading" class="dotted-loader"></div>
          </button>
        </div>
      </div>
    </div>

    <div class="main-layout">
      
<div class="glass-card map-view" [class.expanded]="isMapExpanded">
  
  <div class="card-header map-header">
    <div class="left-title">
      <i class="fa fa-compass"></i> MAP OVERVIEW
    </div>
    
    <!-- New Download Buttons Section -->
    <div class="map-actions">
      <button class="btn-download-kml" (click)="downloadKML()">
        <i class="fa fa-download"></i> KML
      </button>
      <button class="btn-download-shp" (click)="downloadSHP()">
        <i class="fa fa-download"></i> SHP
      </button>
    </div>
  </div>

  <div id="map"></div>
</div>


      <div class="glass-card grid-view selection-grid-context">
        
        <div class="table-container">
           <app-custom-grid 
             [title]="' ATTRIBUTE TABLE'"
             [data]="gridData"
             [columns]="gridColumns"
             [showAdd]="false"
             [showprintbuttons]="true"
             [displayPrint]="false"
             [displayExcel]="false">
           </app-custom-grid>
        </div>


    </div>

  </div>
</div>
