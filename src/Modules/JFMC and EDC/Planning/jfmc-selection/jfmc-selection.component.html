<div class="magic-forest-wrapper">
  <div class="glass-content-layer">
    
    <header class="page-header">
      <h1 class="page-title">JFMC Selection</h1>
      <div class="breadcrumb-container">
        <div class="v-accent-bar"></div>
        <nav class="breadcrumb-nav">
          JFMC & EDC / PLANNING / <span class="active">JFMC SELECTION</span>
        </nav>
      </div>
    </header>

    <div class="toolbar-panel">
      <div class="toolbar-inner">
        <div class="upload-controls">
          <label for="ppa-zip" class="glass-tile">
            <i class="fa fa-cloud-upload"></i>
            <div class="tile-info">
              <strong>PPA Shape Zip</strong>
<span>{{ ppaName || 'Select PPA Shape Zip' }}</span>            </div>
          </label>
          <input id="ppa-zip" type="file" (change)="onFileChange($event, 'ppa')" hidden>

          <label for="hab-zip" class="glass-tile">
            <i class="fa fa-cloud-upload"></i>
            <div class="tile-info">
              <strong>Habitat Shape Zip</strong>
<span>{{ habName || 'Select Habitat Shape Zip' }}</span>            </div>
          </label>
          <input id="hab-zip" type="file" (change)="onFileChange($event, 'hab')" hidden>
        </div>

        <div class="action-btn-wrap">
<button class="btn-go-orange" (click)="Compare()" [disabled]="isLoading">
  <span *ngIf="!isLoading">GO</span>
  <i *ngIf="isLoading" class="fa fa-spinner fa-spin gradient-spinner-icon"></i>
</button>
        </div>
      </div>
    </div>

    <div class="main-layout">
     <div class="glass-card map-view">
  <div class="card-header">
    <div class="left-title"><i class="fa fa-compass"></i> MAP OVERVIEW</div>
    
    <div class="map-actions">
      <button class="btn-kml-sky" (click)="downloadKml()">
        <i class="fa fa-download"></i> KML
      </button>
      
      <button class="btn-shp-green" (click)="downloadShp()">
        <i class="fa fa-download"></i> SHP
      </button>
    </div>

  </div>
  <div id="map"></div>
</div>


      <div class="glass-card grid-view selection-grid-context">
        <app-custom-grid 
          [title]="'SELECTION RESULTS'"
          [data]="gridData"
          [columns]="columns"
          [showAdd]="false"
          [showprintbuttons]="true"
            [displayPrint]="false"
            [displayExcel]="false">
        </app-custom-grid>
      </div>
    </div>

  </div>
</div>
