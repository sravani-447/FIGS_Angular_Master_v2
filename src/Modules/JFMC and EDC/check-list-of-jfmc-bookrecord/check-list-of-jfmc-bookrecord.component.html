

  <!-- Content Section for Grid Display -->
  <div class="content-panel fade-in">
    <div class="grid-card">
      
      <!-- WRAPPER FOR SCROLLING -->
      <div class="catchment-table-scroller">
       <app-custom-grid
       #grid
  title=" Checklist of JFMC Book Record"
 [columns]="columns" [hiddenFields]="hiddenFields"
  [data]="data"
  [showAdd]="false"
  (onUpdateView)="handleStatusUpdate($event);"
  (actionClicked)="onGridAction($event)" 
  [editableFields]="['comments']"
  [showApproveReject]="false"
  [Modulewiserejectbox]= "false"
   *ngIf="!mappopup">
</app-custom-grid>
      </div>

    </div>
  </div>
<div class="image-popup-overlay" *ngIf="showImagePopup">
  <div class="image-popup-box">

    <span class="close-btn" (click)="closeImagePopup()">✖</span>

    <img [src]="popupImageUrl" class="popup-img" />

  </div>
</div>


<div class="map-popup-overlay" *ngIf="mappopup">
  <div class="map-popup-container">

    <div class="map-header">
      <span>📍Map View</span>
      <button class="close-btn" (click)="closeMapPopup()">✖</button>
    </div>

    <div id="map" class="map-body"></div>

  </div>
</div>

<div class="image-popup-overlay" *ngIf="showImagePopup">
  <div class="image-popup-box">
    <span class="close-btn" (click)="closeImagePopup()">✖</span>
    <img [src]="popupImageUrl" class="popup-img" />
  </div>
</div>
